services:
  # API Server
  api:
    container_name: whisperx-api
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - DATABASE_URL=postgresql+asyncpg://whisperx:whisperx@postgres:5432/whisperx
      
      - WHISPER_MODEL=large-v3
      - COMPUTE_TYPE=float16
      - DEVICE=cuda
    volumes:
      - uploads:/data/uploads
      - output:/data/output
      - models:/data/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # Celery Worker (GPU) - WhisperX transcription + pyannote diarization
  worker-gpu:
    container_name: whisperx-worker-gpu
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A backend.tasks.celery_app worker -Q transcription_gpu -c 1 --loglevel=info -n gpu@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.tasks.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 30s
      start_period: 120s
      retries: 3
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - DATABASE_URL=postgresql+asyncpg://whisperx:whisperx@postgres:5432/whisperx

      - WHISPER_MODEL=large-v3
      - COMPUTE_TYPE=float16
      - DEVICE=cuda
    volumes:
      - uploads:/data/uploads
      - output:/data/output
      - models:/data/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # Celery Worker (LLM) - Gemini API text processing (no GPU needed)
  worker-llm:
    container_name: whisperx-worker-llm
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A backend.tasks.celery_app worker -Q transcription_llm -c 3 --loglevel=info -n llm@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.tasks.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 30s
      start_period: 60s
      retries: 3
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - DATABASE_URL=postgresql+asyncpg://whisperx:whisperx@postgres:5432/whisperx
    volumes:
      - uploads:/data/uploads
      - output:/data/output
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # Redis (Task Queue + Job Storage)
  redis:
    container_name: whisperx-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Postgres (Primary Database)
  postgres:
    container_name: whisperx-postgres
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=whisperx
      - POSTGRES_PASSWORD=whisperx
      - POSTGRES_DB=whisperx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whisperx -d whisperx"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Flower (Celery Monitoring) - Optional
  flower:
    container_name: whisperx-flower
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A backend.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
      - worker-gpu
      - worker-llm
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  uploads:
  output:
  models:
  redis_data:
  postgres_data:
