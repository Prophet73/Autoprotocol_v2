# Production Docker Compose
# Frontend on port 3001 (external), API internal only
#
# Usage:
#   cd docker
#   docker-compose -f docker-compose.prod.yml up -d
#
# Architecture:
#   https://test1.dev.svrd.ru/ --> Nginx PM --> frontend:3001 --> api:8000 (internal)

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  # Frontend (Nginx + React build)
  frontend:
    container_name: whisperx-frontend
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ""  # Empty = use relative URLs (proxy handles it)
        VITE_SSO_HUB_ENABLED: "false"
        VITE_SSO_ONLY: "${SSO_ONLY:-false}"
    ports:
      - "3001:80"  # External port for Nginx Proxy Manager
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped
    networks:
      - whisperx-net

  # API Server (internal only)
  api:
    container_name: whisperx-api
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # No ports exposed - accessed via frontend nginx proxy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    env_file:
      - .env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-}@redis:6379/2
      - DATABASE_URL=postgresql+asyncpg://whisperx:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/whisperx
      - WHISPER_MODEL=large-v3
      - COMPUTE_TYPE=float16
      - DEVICE=cuda
      - ENVIRONMENT=production
    volumes:
      - uploads:/data/uploads
      - output:/data/output
      - models:/data/models:ro
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped
    networks:
      - whisperx-net

  # Celery Worker (GPU) - WhisperX transcription + pyannote diarization
  worker-gpu:
    container_name: whisperx-worker-gpu
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A backend.tasks.celery_app worker -Q transcription_gpu -c 1 --loglevel=info -n gpu@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.tasks.celery_app inspect ping -d gpu@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 30s
      start_period: 120s
      retries: 3
    env_file:
      - .env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-}@redis:6379/2
      - DATABASE_URL=postgresql+asyncpg://whisperx:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/whisperx
      - WHISPER_MODEL=large-v3
      - COMPUTE_TYPE=float16
      - DEVICE=cuda
    volumes:
      - uploads:/data/uploads
      - output:/data/output
      - models:/data/models
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped
    networks:
      - whisperx-net

  # Celery Worker (LLM) - Gemini API text processing (no GPU needed)
  worker-llm:
    container_name: whisperx-worker-llm
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A backend.tasks.celery_app worker -Q transcription_llm -c 3 --loglevel=info -n llm@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.tasks.celery_app inspect ping -d llm@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 30s
      start_period: 60s
      retries: 3
    env_file:
      - .env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-}@redis:6379/2
      - DATABASE_URL=postgresql+asyncpg://whisperx:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/whisperx
    volumes:
      - uploads:/data/uploads
      - output:/data/output
    deploy:
      resources:
        limits:
          memory: 2G
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped
    networks:
      - whisperx-net

  # Celery Beat (Periodic Task Scheduler)
  celery-beat:
    container_name: whisperx-celery-beat
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A backend.tasks.celery_app beat --loglevel=info
    env_file:
      - .env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-}@redis:6379/2
      - DATABASE_URL=postgresql+asyncpg://whisperx:${POSTGRES_PASSWORD}@postgres:5432/whisperx
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped
    networks:
      - whisperx-net

  # Redis (Task Queue + Job Storage)
  redis:
    container_name: whisperx-redis
    image: redis:7-alpine
    # No external ports in production
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - whisperx-net

  # Postgres (Primary Database)
  postgres:
    container_name: whisperx-postgres
    image: postgres:15-alpine
    shm_size: 256m
    # No external ports in production
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=whisperx
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - POSTGRES_DB=whisperx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whisperx -d whisperx"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - whisperx-net

  # Flower (Celery Monitoring) - Optional, enable with --profile monitoring
  flower:
    container_name: whisperx-flower
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A backend.tasks.celery_app flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    ports:
      - "127.0.0.1:5555:5555"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    env_file:
      - .env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-}@redis:6379/2
    depends_on:
      - redis
      - worker-gpu
      - worker-llm
    restart: unless-stopped
    profiles:
      - monitoring
    networks:
      - whisperx-net

networks:
  whisperx-net:
    driver: bridge

volumes:
  uploads:
    name: whisperx_uploads
  output:
    name: whisperx_output
  models:
    name: whisperx_models
  redis_data:
    name: whisperx_redis_data
  postgres_data:
    name: whisperx_postgres_data
