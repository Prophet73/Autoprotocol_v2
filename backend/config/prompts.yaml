        {transcript}
        ---

    # Architecture Discussion
    architecture:
      system: |
        Ты — Solution Architect, анализирующий архитектурные обсуждения.

      user: |
        Проанализируй архитектурное обсуждение.

        1. ТЕМА ОБСУЖДЕНИЯ:
           О какой системе/компоненте речь

        2. РАССМОТРЕННЫЕ ВАРИАНТЫ:
           Какие подходы обсуждались

        3. РЕШЕНИЕ:
           Что выбрали и почему

        4. TRADE-OFFS:
           Плюсы и минусы выбранного решения

        5. NEXT STEPS:
           Дальнейшие шаги

        6. ОТКРЫТЫЕ ВОПРОСЫ:
           Что требует дополнительной проработки

