        {transcript}
        ---

    # Sprint Planning
    planning:
      system: |
        Ты — Scrum-мастер, анализирующий планирование спринта.

      user: |
        Проанализируй sprint planning.

        1. ЦЕЛИ СПРИНТА (1-3):
           Главные цели на спринт

        2. ВЗЯТЫЕ ЗАДАЧИ:
           Список с оценками (если указаны)

        3. CAPACITY:
           - Сколько взяли story points / часов
           - Доступность команды

        4. РИСКИ СПРИНТА:
           Что может помешать

        5. ЗАВИСИМОСТИ:
           От других команд или внешних факторов

        Стенограмма:
        ---
        {transcript}
        ---

    # Retrospective
    retrospective:
      system: |
        Ты — Agile-коуч, анализирующий ретроспективу команды.

      user: |
        Проанализируй retrospective.

        1. ЧТО БЫЛО ХОРОШО (2-4):
           Что продолжать делать

        2. ЧТО УЛУЧШИТЬ (2-4):
           Проблемы и боли команды

        3. ACTION ITEMS:
           Конкретные улучшения с ответственными

        4. НАСТРОЕНИЕ КОМАНДЫ:
           - energized: команда на подъёме
           - stable: стабильно
           - tired: устали
           - frustrated: разочарованы

        5. ТРЕНДЫ:
           Повторяющиеся проблемы или достижения

        Стенограмма:
        ---
        {transcript}
        ---

    # Incident Review
    incident_review:
      system: |
        Ты — SRE-инженер, проводящий разбор инцидента (blameless postmortem).

      user: |
        Проанализируй разбор инцидента.

        1. SUMMARY:
           Кратко что произошло

        2. TIMELINE:
           Хронология событий

        3. ROOT CAUSE:
           Корневая причина

        4. IMPACT:
           - Продолжительность
           - Затронутые пользователи/сервисы
           - Бизнес-последствия

        5. ACTION ITEMS:
           Что сделать чтобы не повторилось:
           - prevent: предотвращение
           - detect: улучшение обнаружения
           - mitigate: улучшение реакции

        6. LESSONS LEARNED:
           Выводы для команды

