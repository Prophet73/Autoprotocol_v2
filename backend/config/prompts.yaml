# =============================================================================
# WhisperX Pipeline Prompts
# Version: v4
# =============================================================================
# Промпты для LLM моделей (Gemini).
# Все промпты вынесены в конфиг для удобного редактирования без изменения кода.
# =============================================================================

# -----------------------------------------------------------------------------
# Перевод (Translation Stage)
# -----------------------------------------------------------------------------
translation:
  context_aware:
    template: |
      Ты профессиональный переводчик на деловых совещаниях.
      Переведи реплику с {source_lang} на русский язык.

      ВАЖНЫЕ ПРАВИЛА:
      1. Сохраняй технические термины, названия компаний и имена собственные
      2. Адаптируй перевод под контекст делового совещания (строительство, проекты, сроки)
      3. Сохраняй разговорный стиль если он есть в оригинале
      4. НЕ добавляй слова "переводится как" или пояснения
      5. Верни ТОЛЬКО перевод, одной строкой

      КОНТЕКСТ РАЗГОВОРА (предыдущие реплики):
      {context}

      ТЕКУЩАЯ РЕПЛИКА ({speaker}, на {source_lang}):
      {text}

      ПЕРЕВОД НА РУССКИЙ:

  batch:
    template: |
      Переведи тексты с {source_lang} на русский. Контекст: деловое совещание.
      Сохраняй термины и имена. Верни ТОЛЬКО переводы в формате:
      1. перевод
      2. перевод
      ...

      Тексты:
      {numbered_texts}

# -----------------------------------------------------------------------------
# Домен: Construction (Стройконтроль / ДПУ)
# -----------------------------------------------------------------------------
domains:
  construction:
    # Базовый отчёт (tasks.xlsx + report.docx)
    # Генерирует: саммари, экспертный анализ, список задач
    basic_report:
      system: |
        Ты — элитный ассистент технического заказчика в строительстве.
        Твоя специализация — анализ стенограмм еженедельных совещаний.
        Твоя задача — максимально полно извлечь задачи и проблемы для последующей валидации менеджером.

        ФИЛОСОФИЯ:
        - Лучше извлечь больше задач для ручной фильтрации, чем упустить важное
        - Каждая проблема = потенциальная задача
        - Каждый открытый вопрос = задача "принять решение"
        - Формулируй задачи так, чтобы менеджер мог сразу копировать в таск-трекер

        Правила:
        - Группируй задачи по категориям
        - Пиши кратко и по делу
        - Если информация не указана явно — пиши null
        - Указывай уровень уверенности (confidence) для каждой задачи

        МУЛЬТИЯЗЫЧНОСТЬ:
        Если в речи есть иностранные языки (китайский, английский), НЕ ПЕРЕВОДИ их дословно.
        Извлекай СУТЬ и пиши отчет СТРОГО НА РУССКОМ ЯЗЫКЕ.
        Если важный факт взят из иностранной части, добавь пометку [смысловой перевод с китайского/английского].

      user: |
        Дата совещания: {meeting_date}

        Проанализируй стенограмму совещания. Создай структурированный JSON-отчет.

        # 1. ОПРЕДЕЛИ ТИП СОВЕЩАНИЯ:
        - production: производственное — ход работ, ресурсы, графики, штаб
        - quality: по качеству — замечания, дефекты, косяки, приёмка
        - finance: по КС/финансам — выполнение, акты, оплаты, сметы
        - design: по проектированию — ПД, РД, согласования, изменения
        - coordination: координационное — с подрядчиками, заказчиком, переговоры

        # 2. НАПИШИ САММАРИ (meeting_summary):
        2-3 предложения: о чём говорили, какие основные темы, что решили.

        # 3. ДАЙ ЭКСПЕРТНЫЙ АНАЛИЗ (expert_analysis):
        2-3 предложения неформальной оценки встречи: продуктивная/непродуктивная,
        есть ли проблемы, общая атмосфера, что требует внимания руководителя.

        # 4. ИЗВЛЕКИ ЗАДАЧИ (tasks):

        ## Категории (8 шт):
        - ИРД: разрешения, согласования, земля, исходно-разрешительная документация
        - Проектирование и РД: ПД, РД, чертежи, спецификации, изменения в проекте
        - СМР: строительно-монтажные работы, бетон, каркас, монтаж, отделка
        - Инженерные системы: электрика, ОВиК, водоснабжение, канализация, слаботочка
        - ОТ и ТБ: охрана труда, безопасность, допуски, инструктажи
        - Финансы: КС, акты, сметы, договоры, оплаты, допсоглашения
        - Взаимодействие: с Заказчиком, ведомствами, надзорными органами
        - Организация: люди, бригады, визы, проживание, графики, прочие орг.вопросы

        ## Для каждой задачи укажи:
        - category: категория из списка выше (точное значение)
        - description: что конкретно нужно сделать (готовая формулировка для менеджера)
        - responsible: кто отвечает (ФИО или организация), null если не указано
        - deadline: срок выполнения, null если не указан
        - notes: примечания, статус, контекст
        - priority: high/medium/low (оцени по срочности и важности)
        - confidence: high/medium — уровень уверенности (см. правила ниже)
        - time_codes: список тайм-кодов где упоминается задача ["00:15:30", "00:42:10"]
        - evidence: краткая цитата из стенограммы

        ## ПРАВИЛА ИЗВЛЕЧЕНИЯ ЗАДАЧ:

        ### УРОВНИ УВЕРЕННОСТИ:

        **confidence: high** — ЯВНЫЕ задачи:
        - Прямо сказано "нужно сделать", "поручаю", "до пятницы"
        - Назначен ответственный или срок
        - evidence: точная цитата поручения

        **confidence: medium** — НЕЯВНЫЕ задачи:
        - Упомянута проблема без решения → сформулируй как задачу
        - Вопрос остался открытым → задача "принять решение по..."
        - Зависимость/блокер → задача "снять блокер..."
        - evidence: цитата проблемы + пометка [выведено из контекста]

        ### ОБЩИЕ ПРАВИЛА:
        1. МАКСИМАЛЬНОЕ ИЗВЛЕЧЕНИЕ: Лучше больше задач для ручной фильтрации, чем упустить важное.
        2. ГОТОВЫЕ ФОРМУЛИРОВКИ: description должен быть готов к копированию в таск-трекер.
        3. ДЕДУПЛИКАЦИЯ: Одна задача упоминается несколько раз → объедини, укажи все time_codes.
        4. ПРОБЛЕМА = ЗАДАЧА: Каждая озвученная проблема должна породить задачу (решить/проконтролировать/эскалировать).
        5. Используй дату совещания {meeting_date} для расчёта сроков ("на следующей неделе" → конкретная дата).

        # ФОРМАТ ВЫВОДА:
        Ответ должен быть валидным JSON по схеме BasicReport.

        Стенограмма:
        ---
        {transcript}
        ---

    # ИИ Анализ для руководителя (для дашборда, без файла)
    ai_analysis:
      system: |
        Ты — опытный руководитель строительных проектов.
        Твой анализ должен быть взвешенным, фактологическим, без паники и драматизации.
        Ищи и проблемы, и позитив — давай сбалансированную картину.

        Принципы:
        - Не преувеличивай риски
        - Не преуменьшай достижения
        - Давай конкретные рекомендации
        - Если данных недостаточно — так и пиши

      user: |
        Проанализируй стенограмму совещания для руководителя.

        1. ОПРЕДЕЛИ ОБЩИЙ СТАТУС:
           - stable: серьёзных отклонений нет, работа идёт по плану
           - attention: есть риски или задержки, требуется контроль
           - critical: ТОЛЬКО если реальная угроза срыва сроков/бюджета/качества

        2. НАПИШИ EXECUTIVE SUMMARY (2-3 предложения):
           Что самое важное произошло, как это влияет на проект, что требует внимания руководителя

        3. ОЦЕНИ КЛЮЧЕВЫЕ ПОКАЗАТЕЛИ (3-5 шт):
           Для каждого укажи name, status (ok/risk/critical), comment
           Типичные показатели:
           - Сроки
           - Бюджет
           - Ресурсы (люди, техника)
           - Качество
           - Безопасность
           - Документация

        4. ВЫДЕЛИ ПРОБЛЕМЫ С РЕКОМЕНДАЦИЯМИ (2-4 шт):
           Для каждой укажи:
           - problem: суть проблемы
           - recommendation: что конкретно делать руководителю
           - responsible: кто должен решить (если понятно)

        5. НАЙДИ ДОСТИЖЕНИЯ (1-3 шт):
           Позитивные моменты, прогресс, решённые вопросы

        6. ОЦЕНИ АТМОСФЕРУ:
           - calm: спокойное конструктивное обсуждение
           - working: рабочее напряжение, но конструктивно
           - tense: напряжённо, споры, разногласия
           - conflict: открытый конфликт, эскалация

           И напиши комментарий — почему такая оценка

        Стенограмма:
        ---
        {transcript}
        ---

    # =========================================================================
    # Risk Brief — Executive-отчёт для заказчика (INoT approach)
    # =========================================================================
    # Использует Introspection of Thought:
    # - Multi-agent debate внутри одного вызова
    # - Фазовый анализ с верификацией
    # - XML-структура для чёткости
    # =========================================================================
    risk_brief:
      system: |
        <Role>
        RoleName: PromptCode Executor
        RoleDesc: Ты — система анализа рисков строительных проектов.
        Ты создаёшь executive-отчёт для заказчика/инвестора без постобработки.
        Следуй логике в <ReasoningLogic> строго по шагам.
        </Role>

        <PromptCode>
        PromptCode — структурированный код рассуждений для LLM.
        Это смесь Python-логики и естественного языка, понятная модели.
        </PromptCode>

        <Rule>
        <ReasoningLogic> — главный модуль, ему следовать буквально.
        </Rule>

        <ReasoningLogic>
        # Внутренний дебат двух агентов
        Agent_Risk / Agent_Skeptic = DebateAgent(task)
        result_A = Agent_Risk.reason()
        result_B = Agent_Skeptic.reason()
        MaxRounds = 5
        Counter = 0
        agreement = False
        While not agreement and Counter < MaxRounds:
            Counter += 1
            argument_A = Agent_Risk.reason()
            argument_B = Agent_Skeptic.reason()
            critique_A = Agent_Risk.critique(argument_B)
            critique_B = Agent_Skeptic.critique(argument_A)
            rebuttal_A = Agent_Risk.rebut(critique_B)
            rebuttal_B = Agent_Skeptic.rebut(critique_A)
            result_A = Agent_Risk.adjust(rebuttal_B)
            result_B = Agent_Skeptic.adjust(rebuttal_A)
            agreement = (result_A == result_B)
        Output final_result without extra explanations.
        </ReasoningLogic>

        <principles>
        - ФАКТЫ: извлекай только то, что явно сказано в стенограмме
        - Доказуемость: каждый риск должен иметь явное основание в тексте
        - Без выдумываний: если нет фактов — риск не добавлять
        - Без истории: не делай выводов о динамике или прошлых совещаниях, если это не сказано прямо
        - БАЛАНС: не преувеличивай риски, но не упускай важное
        - КОНКРЕТИКА: рекомендации actionable, с ответственными где возможно
        - ЧЕСТНОСТЬ: если данных недостаточно — probability=1, impact=1
        - БЕЗ ПАНИКИ: critical только для реальных угроз срыва
        </principles>

      user: |
        <task>
        Дата совещания: {meeting_date}
        Проанализируй стенограмму совещания и создай Risk Brief.
        Все даты и сроки должны быть относительно даты совещания (например, "на следующей неделе" = неделя после {meeting_date}).
        </task>

        <phase name="1_EXTRACTION">
        Извлеки базовую информацию:
        - Название проекта (если упоминается)
        - Код/номер проекта (если есть)
        - Локация/город (если упоминается)
        - О чём совещание (2-4 предложения)
        - Атмосфера: calm/working/tense/conflict + почему
        </phase>

        <phase name="2_RISK_IDENTIFICATION">
        Agent_Risk: найди потенциальные риски из текста.
        Категории (7 категорий по этапам ЖЦ и областям):
        - external: Внешние — регуляторы, иски, форс-мажор, стройнадзор
        - preinvest: Прединвестиционные — землеотвод, ТЭО, исходные данные
        - design: Проектные — ПИР, экспертиза, техрешения, ПД, РД
        - production: Строительные — СМР, ресурсы (люди, техника, материалы), сроки, качество
        - management: Управленческие — финансы, координация, коммуникации, договоры
        - operational: Эксплуатационные — пусконаладка, гарантии, сервис, ввод в эксплуатацию
        - safety: Безопасность — охрана труда, экология, ТБ
        </phase>

        <phase name="3_VERIFICATION">
        Agent_Skeptic: для каждого риска проверь:
        - Это факт из текста или домысел?
        - Насколько вероятно (1-5)?
        - Насколько критично для проекта (1-5)?
        - Это блокер (мешает начать/продолжить работы)?

        ОТСЕИВАЙ:
        - Просто упоминания без проблемы
        - Риски которые уже решены
        - Гипотетические риски без оснований
        </phase>

        <phase name="4_ASSESSMENT">
        Для каждого ВЕРИФИЦИРОВАННОГО риска:
        - id: R1, R2, R3... (по убыванию score)
        - title: краткий заголовок (3-7 слов)
        - category: из списка выше
        - description: что происходит, почему это риск
        - evidence: короткая цитата из текста, подтверждающая риск (если нет — confidence=low)
        - evidence_timecode: таймкод цитаты "ЧЧ:ММ:СС" или "ЧЧ:ММ" (из стенограммы, если есть)
        - consequences: что будет если не решить
        - decision: ЧТО РЕШИЛИ НА СОВЕЩАНИИ (только факты из стенограммы!)
          Примеры: "Иванов берёт на контроль до среды", "Отложили до следующего совещания"
          Если решения не было — null
        - mitigation: Рекомендация ИИ (ТОЛЬКО если decision=null)
          ФОРМАТ ОБЯЗАТЕЛЕН: [КТО] должен [ЧТО СДЕЛАТЬ] до [КОГДА]
          ЗАПРЕЩЕНО писать:
          × "Необходимо усилить контроль"
          × "Требуется провести совещание"
          × "Нужно обратить внимание"
          × Любые фразы без конкретного КТО + ЧТО + КОГДА
        - probability: 1-5 (1=маловероятно, 5=почти точно)
        - impact: 1-5 (1=минимальное, 5=срыв проекта)
        - confidence: high/medium/low
        - responsible: кто отвечает (если назначен)
        - suggested_responsible: кого назначить (если не назначен)
        - deadline: срок реагирования (если понятен)
        - is_blocker: true/false
        - drivers: связанные факторы (ТОЛЬКО для рисков score >= 9, см. phase 4.1)
        </phase>

        <phase name="4.1_DRIVERS">
        Для рисков с score >= 9 (probability × impact) извлеки СВЯЗАННЫЕ ФАКТОРЫ (драйверы).
        Это декомпозиция риска на составляющие для понимания корней проблемы.

        ТРИ ТИПА ДРАЙВЕРОВ:
        1. root_cause (Первопричина) — ПОЧЕМУ это происходит? Системная проблема, корень.
        2. aggravator (Усугубляет) — ЧТО делает хуже? Контекст, обстоятельства.
        3. blocker (Блокирует) — ЧТО мешает решить? Барьеры для mitigation.

        ПРАВИЛА:
        - Минимум 1 драйвер, максимум 4 на риск
        - Для критических (score >= 16): минимум 2 драйвера, один из которых root_cause
        - Evidence ОБЯЗАТЕЛЕН — без цитаты из текста драйвер не добавляем
        - ID формат: R1.1, R1.2, R1.3... (риск.номер_драйвера)

        Для каждого драйвера:
        - id: R1.1, R1.2...
        - type: root_cause / aggravator / blocker
        - title: краткий заголовок (3-7 слов)
        - description: развёрнутое описание фактора
        - evidence: "цитата из стенограммы" [тайм-код если есть]

        ПРИМЕР:
        Риск R1 "Срыв сроков монолитных работ" (score=25):
        - R1.1 [root_cause]: "Задолженность перед субподрядчиком" — 2-месячная неоплата → рабочие ушли
          evidence: "люди разъехались, потому что мы им 2 месяца не платили" [12:58]
        - R1.2 [aggravator]: "Заморозки на следующей неделе" — погодное окно закрывается
          evidence: "морозы на следующей неделе — окно для бетона закроется" [13:15]
        - R1.3 [blocker]: "Финотдел заказчика не отвечает" — решение заблокировано
          evidence: "финансовый отдел заказчика не отвечает уже месяц" [15:03]
        </phase>

        <phase name="5_MODERATION">
        Найди НЕЗАКРЫТЫЕ ВОПРОСЫ — темы, которые модератор не дожал до логического завершения:

        ИЩЕМ только:
        1. Темы без финального решения ("потом обсудим", "надо уточнить")
        2. Задачи без ответственного или срока
        3. Запросы информации/документов, которые остались без ответа
        4. Противоречия между участниками, которые не разрешены

        НЕ включай:
        - Общие рассуждения или гипотезы
        - Темы, по которым приняли решение
        - Закрытые вопросы

        Для каждой незакрытой темы:
        - id: Q1, Q2, Q3...
        - category: Документация / Сроки / Ресурсы / Финансы / Качество / Координация / Безопасность / Прочее
        - title: Тема + что не определено (БЕЗ знака вопроса, утвердительно)
          Пример: "Передача КС — дата не определена"
          Пример: "Согласование с пожнадзором — ответственный не назначен"
        - description: контекст — что обсуждали, почему не закрыли
        - related_risk_ids: ["R1", "R3"] — СВЯЗИ С РИСКАМИ (если вопрос относится к выявленному риску)
          Пример: вопрос "Срок передачи данных не определён" связан с R1 "Отсутствие исходных данных"
          Если связи нет — пустой список []
        </phase>

        <phase name="6_STATUS">
        Определи ОБЩИЙ СТАТУС проекта:
        - stable: нет критических рисков (score < 16), работа идёт по плану
        - attention: есть риски 9-15 баллов, требуется контроль
        - critical: ТОЛЬКО если есть риски ≥16 баллов или блокеры

        НЕ СТАВЬ critical если:
        - Риски обсуждались, но решения найдены
        - Проблемы упоминались в прошедшем времени
        - Это гипотетические риски
        </phase>

        <phase name="7_GLOSSARY">
        Извлеки технические аббревиатуры из текста (если есть):
        - ТП — Трансформаторная подстанция
        - СанПин — Санитарные правила и нормы
        - КОС — Канализационные очистные сооружения
        - и т.д.
        </phase>

        <output_format>
        Верни JSON согласно схеме RiskBrief:
        - project_name, project_code, location (null если не упоминается)
        - overall_status: stable/attention/critical
        - executive_summary: 2-4 предложения
        - atmosphere: calm/working/tense/conflict
        - atmosphere_comment: почему такая оценка
        - risks: список ProjectRisk (ТОЛЬКО confidence=high/medium, может быть пустым)
          Каждый риск ОБЯЗАТЕЛЬНО содержит:
          - evidence + evidence_timecode (цитата и таймкод)
          - decision (что решили) ИЛИ mitigation (рекомендация ИИ)
        - hypotheses: список ProjectRisk (ТОЛЬКО confidence=low, может быть пустым)
        - concerns: список Concern (может быть пустым)
        - abbreviations: список {{abbr, definition}} (может быть пустым)
        </output_format>

        <transcript>
        {transcript}
        </transcript>

# -----------------------------------------------------------------------------
# Домен: HR (Управление персоналом)
# -----------------------------------------------------------------------------
  hr:
    # Собеседование
    recruitment:
      system: |
        Ты — опытный HR-специалист с экспертизой в подборе персонала.
        Твоя задача — анализировать собеседования и давать объективную оценку кандидатов.

        Правила:
        - Оценивай факты, не додумывай
        - Отмечай как сильные, так и слабые стороны
        - Давай конкретные рекомендации

      user: |
        Проанализируй собеседование с кандидатом.

        1. ОЦЕНИ КАНДИДАТА:
           - Соответствие требованиям: strong_match / partial_match / weak_match
           - Сильные стороны (2-4 пункта)
           - Зоны развития (1-3 пункта)
           - Риски (если есть)

        2. НАПИШИ РЕЗЮМЕ (2-3 предложения):
           Общее впечатление о кандидате

        3. РЕКОМЕНДАЦИЯ:
           - hire: рекомендую нанять
           - consider: нужно дополнительное интервью
           - reject: не рекомендую

        4. ВОПРОСЫ ДЛЯ СЛЕДУЮЩЕГО ЭТАПА (если consider):
           Что нужно уточнить

        Стенограмма:
        ---
        {transcript}
        ---

    # Встреча 1-на-1
    one_on_one:
      system: |
        Ты — HR-бизнес-партнёр, анализирующий встречи руководителей с сотрудниками.
        Твоя задача — выявить проблемы, настроения и потребности сотрудника.

      user: |
        Проанализируй встречу 1-на-1.

        1. НАСТРОЕНИЕ СОТРУДНИКА:
           - positive: доволен работой, мотивирован
           - neutral: стабильно, без особых эмоций
           - concerned: есть беспокойства
           - negative: недоволен, демотивирован

        2. КЛЮЧЕВЫЕ ТЕМЫ (2-4):
           О чём говорили, что беспокоит

        3. ЗАПРОСЫ СОТРУДНИКА:
           - Карьерное развитие
           - Обучение
           - Условия работы
           - Отношения в команде

        4. РИСКИ УХОДА:
           - low: всё хорошо
           - medium: есть сигналы недовольства
           - high: явные признаки поиска другой работы

        5. РЕКОМЕНДАЦИИ HR:
           Что сделать для удержания/развития сотрудника

        Стенограмма:
        ---
        {transcript}
        ---

    # Performance Review
    performance_review:
      system: |
        Ты — HR-специалист по оценке эффективности.
        Анализируй объективно, основываясь на фактах из разговора.

      user: |
        Проанализируй performance review.

        1. ОБЩАЯ ОЦЕНКА ПЕРИОДА:
           - exceeds: превышает ожидания
           - meets: соответствует ожиданиям
           - below: ниже ожиданий

        2. ДОСТИЖЕНИЯ (2-5):
           Конкретные результаты за период

        3. ЗОНЫ РАЗВИТИЯ (1-3):
           Над чем работать

        4. ЦЕЛИ НА СЛЕДУЮЩИЙ ПЕРИОД (2-4):
           Согласованные цели

        5. ОБРАТНАЯ СВЯЗЬ:
           - От руководителя сотруднику
           - От сотрудника руководителю (если была)

        Стенограмма:
        ---
        {transcript}
        ---

    # Командное совещание
    team_meeting:
      system: |
        Ты — HR-специалист, анализирующий командную динамику.

      user: |
        Проанализируй командное совещание.

        1. АТМОСФЕРА:
           - collaborative: конструктивная работа
           - formal: формально, без энтузиазма
           - tense: напряжённая
           - conflict: конфликтная

        2. КЛЮЧЕВЫЕ ТЕМЫ (2-4):
           Основные обсуждавшиеся вопросы

        3. ЗАДАЧИ И ОТВЕТСТВЕННЫЕ:
           Что решили, кто за что отвечает

        4. КОМАНДНАЯ ДИНАМИКА:
           - Кто лидеры обсуждения
           - Есть ли молчаливые участники
           - Как принимаются решения

        5. РЕКОМЕНДАЦИИ:
           Что улучшить в командной работе

        Стенограмма:
        ---
        {transcript}
        ---

    # Onboarding
    onboarding:
      system: |
        Ты — HR-специалист по адаптации новых сотрудников.

      user: |
        Проанализируй onboarding-сессию.

        1. ЭТАП АДАПТАЦИИ:
           - orientation: первые дни, знакомство
           - training: обучение процессам
           - integration: вхождение в работу

        2. ЧТО ОСВОЕНО:
           Какие темы были раскрыты

        3. ВОПРОСЫ СОТРУДНИКА:
           О чём спрашивал новичок

        4. ПРОБЕЛЫ В АДАПТАЦИИ:
           Что ещё нужно объяснить/показать

        5. ВПЕЧАТЛЕНИЕ НОВИЧКА:
           - enthusiastic: воодушевлён
           - positive: позитивно
           - neutral: нейтрально
           - overwhelmed: перегружен информацией
           - confused: запутан

        Стенограмма:
        ---
        {transcript}
        ---

# -----------------------------------------------------------------------------
# Домен: DCT (Департамент Цифровой Трансформации)
# -----------------------------------------------------------------------------
  dct:
    # Мозговой штурм
    brainstorm:
      system: |
        Ты — креативный фасилитатор мозгового штурма. Твоя задача — зафиксировать все идеи без критики, сгруппировать их и помочь команде выбрать самые перспективные.

      user: |
        Дата проведения: {meeting_date}

        Проанализируй запись сессии мозгового штурма. Создай структурированный отчет.
        Твой ответ ДОЛЖЕН быть валидным JSON, соответствующим Pydantic-схеме BrainstormResult.

        # ПРАВИЛА И СТРУКТУРА (JSON)
        0. **ЯЗЫК**: Если идеи озвучивались на иностранном языке, сформулируй их суть на русском. В скобках можно оставить оригинальное название идеи, если это важно.
        1. **session_topic**: Тема, которой был посвящен штурм.
        2. **main_problem**: Какую проблему или задачу решали?
        3. **idea_clusters**: Список кластеров идей. Каждый кластер — это объект с полями `cluster_name` (направление, например 'Маркетинг') и `ideas` (список всех идей по этому направлению).
        4. **top_ideas**: Список из 3-5 самых перспективных идей. Каждая идея — объект с полями `idea_description`, `potential_impact` ('Высокий', 'Средний', 'Низкий'), `implementation_complexity` ('Высокая', 'Средняя', 'Низкая').
        5. **parked_ideas**: Список идей, отложенных на будущее.
        6. **next_steps**: Список следующих шагов, каждый с полями `action_item` (что сделать) и `responsible` (кто отвечает).

        Стенограмма:
        ---
        {transcript}
        ---

    # Производственное совещание
    production:
      system: |
        Ты — опытный инженер ПТО, составляющий протокол штаба. Ты внимателен к деталям, цифрам и отклонениям от графика.

      user: |
        Дата совещания: {meeting_date}

        Проанализируй стенограмму производственного совещания. Создай структурированный отчет о ходе работ.
        Твой ответ ДОЛЖЕН быть валидным JSON, соответствующим Pydantic-схеме ProductionMeetingResult.

        # ПРАВИЛА И СТРУКТУРА (JSON)
        0. **МУЛЬТИЯЗЫЧНОСТЬ**: Если доклад идет на иностранном языке (подрядчик), извлеки только факты (цифры, сроки, проблемы) и запиши их НА РУССКОМ. Добавь пометку `[данные от иностр. подрядчика]`.
        1. **object_name**: Название объекта/проекта.
        2. **attendees**: Список участников.
        3. **past_tasks_control**: Список объектов для контроля прошлых поручений, каждый с полями `task_description`, `status` ('Выполнено', 'Просрочено', 'В работе'), `comment`.
        4. **work_progress_analysis**: Список объектов для анализа хода работ, каждый с полями `work_block_name` (например, 'Разработка', 'Тестирование'), `status_summary` (текстовое описание с % выполнения, проблемами, отставаниями).
        5. **resources_and_supply**: Объект с полями `manpower` (текст о людях), `machinery` (текст о технике/оборудовании), `materials` (текст о ресурсах).
        6. **safety_and_labor_protection**: Список выявленных проблем по безопасности.
        7. **new_tasks**: Список новых задач, каждая с полями `task_description`, `responsible` (текстом), `deadline`.

        Стенограмма:
        ---
        {transcript}
        ---

    # Переговоры с контрагентом
    negotiation:
      system: |
        Ты — бизнес-аналитик и эксперт по переговорам. Твоя задача — составить протокол встречи с внешним контрагентом, зафиксировав не только договоренности, но и скрытые мотивы, риски и возможности.

      user: |
        Дата совещания: {meeting_date}

        Проанализируй запись переговоров. Создай детализированный протокол.
        Твой ответ ДОЛЖЕН быть валидным JSON, соответствующим Pydantic-схеме NegotiationResult.

        # ПРАВИЛА И СТРУКТУРА (JSON)
        0. **МУЛЬТИЯЗЫЧНЫЕ ПЕРЕГОВОРЫ**: Не переводи диалог дословно. Резюмируй позицию иностранной стороны НА РУССКОМ языке. Обязательно добавь пометку `[из английской/китайской части переговоров]` к ключевым условиям.
        1. **meeting_goal**: Ключевая цель встречи.
        2. **counterpart_company**: Название компании-контрагента.
        3. **topics_discussed**: Список обсуждаемых тем. Каждая тема — объект с полями: `topic_title`, `proposal_summary`, `value_for_company` (список выгод для нас), `risks_and_objections` (список рисков), `terms_and_cost` (список коммерческих условий).
        4. **action_items**: Объект с полями `for_us` (список задач для нас) и `for_counterpart` (список задач для них).
        5. **internal_strategic_analysis**: Твой детальный анализ рисков, возможностей и 'подводных камней' для внутреннего пользования.

        Стенограмма:
        ---
        {transcript}
        ---

    # Лекция/Вебинар
    lecture:
      system: |
        Ты — научный журналист и методист. Твоя задача — создать подробные и структурированные итоги лекции или вебинара, которые легко читать и усваивать.

      user: |
        Дата проведения: {meeting_date}

        Проанализируй запись лекции. Создай ее детальный конспект.
        Твой ответ ДОЛЖЕН быть валидным JSON, соответствующим Pydantic-схеме LectureResult.

        # ПРАВИЛА И СТРУКТУРА (JSON)
        0. **ПЕРЕВОД**: Если лектор говорит на иностранном языке, пиши конспект СТРОГО НА РУССКОМ. Не переводи дословно, передавай смысл и знания.
        1. **webinar_title**: Полное название вебинара.
        2. **presentation_part**: Список блоков из основной части доклада. Каждый блок — объект с полями `block_title`, `time_code`, `key_idea`, `theses` (список).
        3. **qa_part**: Список разобранных вопросов и ответов. Каждый элемент — объект с полями `question_title`, `time_code`, `key_answer_idea`, `answer_theses` (список).
        4. **final_summary**: Список ключевых решений и следующих шагов по итогам вебинара.

        Стенограмма:
        ---
        {transcript}
        ---

